apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Entry point pro Argo CD Application apontar.
#
# Este repo contem apenas conteudo *do workload* trivy-operator:
#   alerts/   — PrometheusRule (findings High/Critical + exposed secrets)
#
# O controller + CRDs vem do chart Aqua, referenciado em
# `deploy-argocd/apps/applications/security-trivy-operator.yaml`.
# Values do chart (scanners habilitados, severidades, namespaces
# excluidos, limits) vivem la junto com a Application.

resources:
  - alerts
