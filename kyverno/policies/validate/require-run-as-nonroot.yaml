apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-nonroot
  annotations:
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Containers devem rodar como non-root (runAsNonRoot=true), no
      pod ou no container. Baseline do Pod Security Standard restrito.
spec:
  background: true
  rules:
    - name: run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        failureAction: Audit
        message: >-
          runAsNonRoot deve ser true (em spec.securityContext ou em
          cada container).
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
              # quando definido no pod, containers nao podem sobrescrever p/ false
              =(containers):
                - =(securityContext):
                    =(runAsNonRoot): true
          - spec:
              =(securityContext):
                =(runAsNonRoot): true
              containers:
                - securityContext:
                    runAsNonRoot: true
