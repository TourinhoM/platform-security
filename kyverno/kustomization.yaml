apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Entry point pro Argo CD Application (security-kyverno-config) apontar.
#
# Conteudo = POLICIES Kyverno (ClusterPolicy). O controller + CRDs vem
# do chart oficial, referenciado em
# `platform-gitops/apps/system/security-kyverno.yaml` (wave 0).
#
# Rollout em fases:
#   policies/validate/  — Fase 1, todas em failureAction: Audit (so reporta).
#   policies/mutate/    — Fase 2 (injeta defaults sãos). [a criar]
#   policies/generate/  — Fase 3 (gera NetworkPolicy/Quota por ns). [a criar]
#
# Promover validate p/ Enforce uma a uma so depois dos PolicyReports
# estarem limpos (kubectl get cpolr / polr -A).

resources:
  - policies/validate
