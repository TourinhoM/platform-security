apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: security
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.28.0
    helm:
      values: |
        global:
          enabled: true

        injector:
          enabled: false

        server:
          standalone:
            enabled: true
            config: |
              ui = true

              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }

              storage "file" {
                path = "/vault/data"
              }

          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m

          dataStorage:
            enabled: true
            size: 1Gi

          volumes:
            - name: unseal-key
              secret:
                secretName: vault-unseal-key
                optional: true

          volumeMounts:
            - name: unseal-key
              mountPath: /vault/userconfig/vault-unseal-key
              readOnly: true

          postStart:
            - /bin/sh
            - -c
            - |
              sleep 5
              while true; do
                vault status; rc=$?
                [ "$rc" -eq 0 ] && exit 0
                [ "$rc" -eq 2 ] && [ -f /vault/userconfig/vault-unseal-key/key ] && vault operator unseal "$(cat /vault/userconfig/vault-unseal-key/key)" && exit 0
                [ "$rc" -eq 2 ] && [ ! -f /vault/userconfig/vault-unseal-key/key ] && exit 0
                sleep 2
              done

        ui:
          enabled: true
          serviceType: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
