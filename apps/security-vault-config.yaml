apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-vault-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: system
  source:
    repoURL: https://github.com/TourinhoM/platform-security.git
    targetRevision: main
    path: vault
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
