apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-trivy-operator-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: system
  source:
    repoURL: https://github.com/TourinhoM/platform-security.git
    targetRevision: main
    path: trivy-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
