apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-dependency-track-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: security
  source:
    repoURL: https://github.com/TourinhoM/platform-security.git
    targetRevision: main
    path: dtrack/base
  destination:
    server: https://kubernetes.default.svc
    namespace: dtrack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 15
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
