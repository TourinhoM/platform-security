apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-bootstrap-script
  namespace: vault
data:
  bootstrap.sh: |
    #!/bin/sh
    set -e

    export VAULT_ADDR="http://security-vault:8200"
    export VAULT_TOKEN
    VAULT_TOKEN="$(cat /vault/bootstrap-token/token)"

    # Token inválido ou expirado = bootstrap já foi feito anteriormente
    if ! vault token lookup > /dev/null 2>&1; then
      echo "Token de bootstrap inválido ou expirado — nada a fazer"
      exit 0
    fi

    echo "=== KV v2 secrets engine ==="
    vault secrets enable -path=secret kv-v2 2>/dev/null || echo "já habilitado"

    echo "=== Kubernetes auth method ==="
    vault auth enable kubernetes 2>/dev/null || echo "já habilitado"
    vault write auth/kubernetes/config \
      kubernetes_host="https://kubernetes.default.svc"

    echo "=== Policy: eso-read ==="
    vault policy write eso-read - <<'POLICY'
    path "secret/data/*" {
      capabilities = ["read", "list"]
    }
    path "secret/metadata/*" {
      capabilities = ["read", "list"]
    }
    POLICY

    echo "=== Policy: crossplane-write ==="
    vault policy write crossplane-write - <<'POLICY'
    path "secret/data/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }
    path "secret/metadata/*" {
      capabilities = ["read", "list", "delete"]
    }
    POLICY

    echo "=== Role: eso ==="
    vault write auth/kubernetes/role/eso \
      bound_service_account_names=external-secrets \
      bound_service_account_namespaces=external-secrets \
      policies=eso-read \
      ttl=1h

    echo "=== Role: provider-vault ==="
    vault write auth/kubernetes/role/provider-vault \
      bound_service_account_names=provider-vault \
      bound_service_account_namespaces=crossplane-system \
      policies=crossplane-write \
      ttl=1h

    echo "=== Secrets de aplicação ==="
    genpass() { cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 32; }

    vault kv put secret/cluster/grafana \
      admin_password="$(genpass)" \
      db_password="$(genpass)"
    echo "secret/cluster/grafana criado."

    vault kv put secret/cluster/postgresql \
      superuser_password="$(genpass)"
    echo "secret/cluster/postgresql criado."

    vault kv put secret/cluster/keycloak \
      admin_password="$(genpass)"
    echo "secret/cluster/keycloak criado."

    vault kv put secret/cluster/dtrack \
      db_password="$(genpass)" \
      api_key=""
    echo "secret/cluster/dtrack criado."

    vault kv put secret/cluster/backstage \
      db_password="$(genpass)" \
      github_token=""
    echo "secret/cluster/backstage criado."

    echo "=== Revogando token de bootstrap ==="
    vault token revoke -self || true

    echo "=== Bootstrap concluído ==="
