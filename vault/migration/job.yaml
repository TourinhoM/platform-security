apiVersion: batch/v1
kind: Job
metadata:
  name: vault-migration
  namespace: vault
spec:
  template:
    spec:
      serviceAccountName: vault-migration
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: python:3.12-alpine
          command: ["python3", "/scripts/migrate.py"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: migration-token
              mountPath: /vault/migration-token
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: vault-migration-script
        - name: migration-token
          secret:
            secretName: vault-migration-token
