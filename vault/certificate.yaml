apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: tls
spec:
  secretName: vault-tls

  duration: 2160h
  renewBefore: 360h

  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always

  dnsNames:
    - vault.local

  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
