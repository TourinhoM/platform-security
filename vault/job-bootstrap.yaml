apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap
  namespace: vault
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: vault-bootstrap
          image: hashicorp/vault:1.17.0
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: bootstrap-token
              mountPath: /vault/bootstrap-token
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: vault-bootstrap-script
            defaultMode: 0755
        - name: bootstrap-token
          secret:
            secretName: vault-bootstrap-token
